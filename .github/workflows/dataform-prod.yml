name: Dataform Production
on:
  push:
    branches: [ main ]
jobs:
  dataform_run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify Google Cloud authentication
        run: gcloud auth list

      - name: Show active gcloud project
        run: gcloud config list

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Dataform CLI
        run: npm install -g @dataform/cli

      - name: Create Dataform credentials file
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          cat > convert_creds.py << 'EOF'
          import json, os
          sa = json.loads(os.environ['GCP_SA_KEY'])
          df_creds = {"projectId": sa["project_id"], "credentials": {"client_email": sa["client_email"], "private_key": sa["private_key"]}}
          with open(".df-credentials.json", "w") as f:
            json.dump(df_creds, f)
          EOF
          python3 convert_creds.py

      - name: Debug credentials file
        run: cat .df-credentials.json

      - name: Run Dataform
        run: dataform run --project-dir .
