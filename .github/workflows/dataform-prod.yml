name: Dataform Production
on:
  push:
    branches: [ main ]
jobs:
  dataform_run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify Google Cloud authentication
        run: gcloud auth list

      - name: Show active gcloud project
        run: gcloud config list

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Dataform CLI
        run: npm install -g @dataform/cli

      - name: Create Dataform credentials file
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          echo $GCP_SA_KEY | python3 -c "
          import json,sys
          sa=json.load(sys.stdin)
          print(json.dumps({'projectId':sa['project_id'],'credentials':{'client_email':sa['client_email'],'private_key':sa['private_key']}}))" > .df-credentials.json

      - name: Run Dataform
        run: dataform run --project-dir .
